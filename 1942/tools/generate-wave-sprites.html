<!DOCTYPE html>
<html>
<head>
    <title>Wave Sprite Generator</title>
    <style>
        body { font-family: Arial, sans-serif; padding: 20px; }
        canvas { border: 1px solid #ccc; margin: 10px; image-rendering: pixelated; }
        .sprite-section { margin: 20px 0; }
        .preview { transform: scale(4); transform-origin: top left; margin-bottom: 100px; }
    </style>
</head>
<body>
    <h1>1942 Wave Sprite Generator</h1>
    <p>Creating 32x16px wave effect sprites in clean geometric style</p>
    
    <div class="sprite-section">
        <h3>Wave Wake (V-shaped wake pattern)</h3>
        <canvas id="wake" width="32" height="16" class="preview"></canvas>
        <button onclick="downloadSprite('wake')">Download wave-wake.png</button>
    </div>
    
    <div class="sprite-section">
        <h3>Wave Splash (Circular splash effect)</h3>
        <canvas id="splash" width="32" height="16" class="preview"></canvas>
        <button onclick="downloadSprite('splash')">Download wave-splash.png</button>
    </div>
    
    <div class="sprite-section">
        <h3>Wave Foam (White foam texture)</h3>
        <canvas id="foam" width="32" height="16" class="preview"></canvas>
        <button onclick="downloadSprite('foam')">Download wave-foam.png</button>
    </div>

    <script>
        function createWakeSprite() {
            const canvas = document.getElementById('wake');
            const ctx = canvas.getContext('2d');
            ctx.clearRect(0, 0, 32, 16);
            
            // V-shaped wake pattern - clean geometric lines
            ctx.fillStyle = 'rgba(255, 255, 255, 0.8)'; // Semi-transparent white
            
            // Left side of V
            for (let i = 0; i < 8; i++) {
                ctx.fillRect(8 - i, 8 + i, 2, 1);
            }
            
            // Right side of V
            for (let i = 0; i < 8; i++) {
                ctx.fillRect(24 + i, 8 + i, 2, 1);
            }
            
            // Add some lighter foam trails
            ctx.fillStyle = 'rgba(255, 255, 255, 0.4)';
            for (let i = 0; i < 6; i++) {
                ctx.fillRect(10 - i, 10 + i, 1, 1);
                ctx.fillRect(22 + i, 10 + i, 1, 1);
            }
        }

        function createSplashSprite() {
            const canvas = document.getElementById('splash');
            const ctx = canvas.getContext('2d');
            ctx.clearRect(0, 0, 32, 16);
            
            // Circular splash effect - geometric circles
            const centerX = 16;
            const centerY = 8;
            
            // Outer splash ring
            ctx.fillStyle = 'rgba(255, 255, 255, 0.6)';
            for (let angle = 0; angle < Math.PI * 2; angle += Math.PI / 8) {
                const x = centerX + Math.cos(angle) * 7;
                const y = centerY + Math.sin(angle) * 4;
                ctx.fillRect(Math.floor(x), Math.floor(y), 2, 2);
            }
            
            // Middle ring
            ctx.fillStyle = 'rgba(255, 255, 255, 0.8)';
            for (let angle = 0; angle < Math.PI * 2; angle += Math.PI / 6) {
                const x = centerX + Math.cos(angle) * 4;
                const y = centerY + Math.sin(angle) * 2;
                ctx.fillRect(Math.floor(x), Math.floor(y), 2, 1);
            }
            
            // Center splash
            ctx.fillStyle = 'rgba(255, 255, 255, 1.0)';
            ctx.fillRect(centerX - 1, centerY - 1, 3, 2);
        }

        function createFoamSprite() {
            const canvas = document.getElementById('foam');
            const ctx = canvas.getContext('2d');
            ctx.clearRect(0, 0, 32, 16);
            
            // White foam texture - geometric bubbles and patterns
            ctx.fillStyle = 'rgba(255, 255, 255, 0.9)';
            
            // Large foam patches
            ctx.fillRect(2, 2, 4, 3);
            ctx.fillRect(8, 1, 6, 2);
            ctx.fillRect(18, 3, 5, 4);
            ctx.fillRect(26, 1, 4, 3);
            ctx.fillRect(1, 8, 5, 3);
            ctx.fillRect(12, 10, 7, 4);
            ctx.fillRect(22, 9, 6, 4);
            ctx.fillRect(4, 13, 4, 2);
            
            // Smaller foam dots
            ctx.fillStyle = 'rgba(255, 255, 255, 0.7)';
            ctx.fillRect(7, 5, 2, 2);
            ctx.fillRect(15, 1, 2, 1);
            ctx.fillRect(25, 6, 2, 2);
            ctx.fillRect(11, 7, 1, 2);
            ctx.fillRect(29, 11, 2, 2);
            ctx.fillRect(8, 14, 2, 1);
            ctx.fillRect(19, 14, 1, 1);
            
            // Fine foam speckles
            ctx.fillStyle = 'rgba(255, 255, 255, 0.5)';
            for (let i = 0; i < 20; i++) {
                const x = Math.floor(Math.random() * 32);
                const y = Math.floor(Math.random() * 16);
                ctx.fillRect(x, y, 1, 1);
            }
        }

        function downloadSprite(type) {
            const canvas = document.getElementById(type);
            const link = document.createElement('a');
            link.download = `wave-${type}.png`;
            link.href = canvas.toDataURL();
            link.click();
        }

        // Generate sprites on load
        createWakeSprite();
        createSplashSprite();
        createFoamSprite();
    </script>
</body>
</html>
